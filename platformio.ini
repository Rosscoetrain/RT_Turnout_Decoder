; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = 
	nanoatmega328new
	bluepill_f103c8_usb
src_dir = src
include_dir = include

[env:nanoatmega328new]
platform = atmelavr
board = nanoatmega328new
framework = arduino
monitor_speed = 115200
monitor_filters = send_on_enter
monitor_echo = yes
build_flags = -D NANO_SMT_BOARD
lib_deps = 
;	mrrwa/NmraDcc@^2.0.16
    https://github.com/Rosscoetrain/NmraDcc
	aharshac/StringSplitter@^1.0.0

[env:nanoatmega328new_KATO]
platform = atmelavr
board = nanoatmega328new
framework = arduino
monitor_speed = 115200
monitor_filters = send_on_enter
monitor_echo = yes
build_flags = -D KATO_SMT_BOARD
lib_deps = 
;	mrrwa/NmraDcc@^2.0.16
    https://github.com/Rosscoetrain/NmraDcc
	aharshac/StringSplitter@^1.0.0



[env:bluepill_f103c8_usb]
platform = ststm32
board = bluepill_f103c8
;board = genericSTM32F103C8
framework = arduino
;board_build.variant = BLUEPILL_F103C8XX

upload_protocol = stlink


monitor_speed = 115200
monitor_filters = send_on_enter
monitor_echo = yes


build_flags = 
    -D STM32F1xx_Blue_Pill
	-D STM32F1
	-D ARDUINO_BLUEPILL_F103C8
	-D RT_TURNOUT_DECODER
	-D PIO_FRAMEWORK_ARDUINO_ENABLE_CDC -Os

lib_deps = 
;    mrrwa/NmraDcc@^2.0.16
;    khoih-prog/FlashStorage_STM32F1@^1.1.0
    https://github.com/Rosscoetrain/NmraDcc
	aharshac/StringSplitter@^1.0.0



[env:stumpy_f103c8_usb]
platform = ststm32
board = bluepill_f103c8
framework = arduino
monitor_speed = 115200
monitor_filters = send_on_enter
monitor_echo = yes
build_flags = 
    -D STM32F1xx_Stumpy
	-D ARDUINO_BLUEPILL_F103C8
	-D RT_TURNOUT_DECODER
lib_deps = 
;	mrrwa/NmraDcc@^2.0.16
    https://github.com/Rosscoetrain/NmraDcc
	aharshac/StringSplitter@^1.0.0




